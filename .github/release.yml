# Auto-generated release notes config (used by generate_release_notes in
# .github/workflows/release.yml). GitHub groups merged PRs since the previous
# tag into these categories by label. PR-flow: open a PR, label it, merge to
# main; the next `v*` tag's release notes are built from those PRs.
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions
  categories:
    - title: ✨ Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - fix
        - bug
    - title: ⚡ Performance
      labels:
        - performance
        - perf
    - title: ♻️ Refactor
      labels:
        - refactor
    - title: 📝 Documentation
      labels:
        - documentation
        - docs
    - title: 🔧 Maintenance
      labels:
        - chore
        - deps
        - ci
    - title: 🔀 Other Changes
      labels:
        - "*"
