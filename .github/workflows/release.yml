name: release

# Tag-driven release. Push a tag like `v1.2.3` to: run tests, build a runnable
# uberjar, and publish a GitHub Release with the jar attached.
#
#   git tag v1.2.3 && git push origin v1.2.3
#
# No Clojars publishing — SaltRim is a runnable app, distributed as the uberjar
# on the GitHub Release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # needed to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history — the version's patch number is
                                  # the commit count (a shallow clone reports 1)

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: '1.12.0.1488'

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: cljdeps-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-

      # Version's single source of truth is build.clj (base-version + commit
      # count) — NOT the tag. We read it from the build, then verify the pushed
      # tag agrees, so a tag can never name a release that disagrees with build.
      - name: Derive version (single source of truth = build.clj)
        id: ver
        run: echo "version=$(clojure -T:build version | tail -1)" >> "$GITHUB_OUTPUT"

      - name: Verify pushed tag matches derived version
        run: |
          if [ "v${{ steps.ver.outputs.version }}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} != build.clj version v${{ steps.ver.outputs.version }}" >&2
            echo "Tag with: V=\$(clojure -T:build version); git tag v\$V && git push origin v\$V" >&2
            exit 1
          fi

      - name: Test
        run: clojure -X:test

      - name: Build uberjar
        run: clojure -T:build uber

      # Stable, version-independent copy so consumers can fetch the newest jar
      # from a fixed URL: releases/latest/download/server.jar. The reposado
      # servers flake pins this via a `file+https` flake input (saltrim-jar).
      - name: Stable-named copy for latest-download fetch
        run: cp "target/saltrim-${{ steps.ver.outputs.version }}.jar" target/server.jar

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/saltrim-${{ steps.ver.outputs.version }}.jar
            target/server.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
